{{ $videoPath := or (.Get "src") .Page.Params.video }}
{{ $video := resources.Get $videoPath }}
{{ if $video }}
  <video controls preload="metadata" playsinline width="100%" height="480">
    <source src="{{ $video.RelPermalink }}#t=0.001" type="video/mp4">
    Your browser does not support the video tag.
  </video>
{{ else }}
  <p style="color: red;">Video not found: {{ $videoPath }}</p>
{{ end }}
