{{ $audioPath := or (.Get "src") .Page.Params.audio }}
{{ $audio := resources.Get $audioPath }}
{{ if $audio }}
<audio controls preload="auto" x-webkit-airplay="deny" style="width: 100%; margin: 1rem 0;">
  <source src="{{ $audio.RelPermalink }}" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>
{{ else }}
<p style="color: red;">Audio not found: {{ $audioPath }}</p>
{{ end }}
